<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Contacto | Guaguareando Ando</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS GLOBAL -->
  <link rel="stylesheet" href="/assets/css/base.css">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/assets/css/contact.css">
  <link rel="stylesheet" href="/assets/css/responsive.css">
</head>

<body>

  <div id="header"></div>

  <main>

    <!-- HERO -->
    <section class="contact-hero">
      <div class="container">
        <h1>Contáctanos</h1>
        <p>Queremos escucharte. Escríbenos y hagamos algo juntos.</p>
      </div>
    </section>

    <!-- CONTACTO -->
    <section class="contact-main">
      <div class="container contact-grid">

        <!-- FORMULARIO -->
        <div class="contact-form">

          <h2>Envíanos un mensaje</h2>

          <form id="contactForm">

            <div class="form-group">
              <input type="text" name="name" placeholder="Nombre completo" required>
            </div>

            <div class="form-group">
              <input type="email" name="email" placeholder="Correo electrónico" required>
            </div>

            <div class="form-group">
              <textarea name="message" rows="5" placeholder="Escribe tu mensaje..." required></textarea>
            </div>

            <button type="submit" class="btn btn--primary">
              Enviar mensaje
            </button>

          </form>

        </div>

        <!-- INFO -->
        <div class="contact-info">

          <h2>Información</h2>

          <p>También puedes contactarnos directamente:</p>

          <ul>
            <li>📍 Ciudad de México</li>
            <li>🎙 Guaguareando Ando</li>
          </ul>

          <a href="https://wa.me/573007283526" target="_blank" class="btn btn--secondary">
            💬 Contactar por WhatsApp
          </a>

        </div>

      </div>
    </section>

  </main>

  <div id="footer"></div>

  <script src="/assets/js/main.js"></script>
</body>
</html>
